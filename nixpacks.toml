[phases.setup]
nixPkgs = ["python311", "nodejs-20_x"]

[phases.install]
cmds = ["python -m venv /app/.venv && /app/.venv/bin/pip install -r requirements.txt", "cd client && npm install"]

[phases.build]
cmds = ["cd client && npm run build"]

[start]
cmd = "/app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port ${PORT:-5000}"
